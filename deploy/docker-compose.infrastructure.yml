services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: sapling-postgres-vector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sapling}
      POSTGRES_USER: ${POSTGRES_USER:-sapling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sapling-change-me}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ${APP_ROOT:-/var/www/sapling}/shared/infrastructure/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sapling} -d ${POSTGRES_DB:-sapling}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sapling-redis-cache
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - ${APP_ROOT:-/var/www/sapling}/shared/infrastructure/redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
